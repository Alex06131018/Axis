<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在加载...</title>
    <style>
        :root {
            --theme-color: #c9a0a0;
            --theme-bg: #faf6f4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--theme-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', '宋体', serif;
            overflow: hidden;
            cursor: default;
            -webkit-user-select: none;
            user-select: none;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 40px 20px;
            text-align: center;
            max-width: 85vw;
        }

        /* 第一行 - LOADING 特殊符号 */
        .loading-symbol {
            color: var(--theme-color);
            font-size: 12px;
            letter-spacing: 4px;
            opacity: 0.85;
            font-family: serif;
            white-space: nowrap;
        }

        /* 第二行 - 关键词 */
        .keyword {
            color: var(--theme-color);
            font-size: 32px;
            font-weight: normal;
            letter-spacing: 3px;
            font-family: 'Times New Roman', 'Georgia', serif;
            animation: keywordPulse 2.5s ease-in-out infinite;
        }

        @keyframes keywordPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }

        /* 第三行 - 氛围感句子 */
        .atmosphere-text {
            color: var(--theme-color);
            font-size: 15px;
            letter-spacing: 2px;
            opacity: 0.8;
            min-height: 22px;
            transition: opacity 0.6s ease;
        }

        /* 加载条 - 圆点滑动 */
        .loader-track {
            width: 70vw;
            max-width: 260px;
            height: 2px;
            background: rgba(201, 160, 160, 0.2);
            border-radius: 2px;
            position: relative;
            overflow: visible;
        }

        .loader-dot {
            position: absolute;
            top: 50%;
            left: 0;
            width: 10px;
            height: 10px;
            background: var(--theme-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px var(--theme-color), 0 0 16px var(--theme-color);
            animation: dotSlide 2.5s ease-in-out infinite;
        }

        @keyframes dotSlide {
            0% { left: 0%; }
            100% { left: 100%; }
        }

        /* 底部文字 - 发光 */
        .bottom-text {
            color: var(--theme-color);
            font-size: 13px;
            letter-spacing: 2px;
            opacity: 0.85;
            min-height: 20px;
            transition: all 0.6s ease;
            white-space: nowrap;
            text-shadow: 0 0 6px var(--theme-color), 0 0 12px var(--theme-color);
        }

        .bottom-text.clickable {
            cursor: pointer;
            opacity: 1;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .bottom-text.clickable:hover {
            text-shadow: 0 0 14px var(--theme-color), 0 0 24px var(--theme-color);
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 6px var(--theme-color), 0 0 12px var(--theme-color); }
            50% { text-shadow: 0 0 14px var(--theme-color), 0 0 24px var(--theme-color); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <!-- 第一行 - 固定 -->
        <div class="loading-symbol">˚₊‧꒰𓆩 &nbsp; L &nbsp; O &nbsp; A &nbsp; D &nbsp; I &nbsp; N &nbsp; G &nbsp; 𓆪꒱ ‧₊˚</div>

        <!-- 第二行 - 关键词 -->
        <div class="keyword" id="keyword">Starlight</div>

        <!-- 第三行 - 氛围感句子 -->
        <div class="atmosphere-text" id="atmosphereText">星光指引我来见你</div>

        <!-- 加载条 - 圆点滑动 -->
        <div class="loader-track">
            <div class="loader-dot"></div>
        </div>

        <!-- 底部 - 固定英文 + 阶段中文，发光 -->
        <div class="bottom-text" id="bottomText">A WORLD OF OUR OWN · 感知彼此</div>
    </div>

    <script>
        // ==================== 数据配置 ====================
        const wordBank = [
            { keyword: 'Starlight', text: '星光指引我来见你' },
            { keyword: 'Serendipity', text: '遇见你是最美的意外' },
            { keyword: 'Destiny', text: '命中注定的相遇' },
            { keyword: 'Eternity', text: '在时间的尽头等你' },
            { keyword: 'Moonlight', text: '月光洒在你我之间' },
            { keyword: 'Forever', text: '永远有多远，就有多近' },
            { keyword: 'Lucky', text: '此生最大的幸运' },
            { keyword: 'Memory', text: '每一帧回忆都是你' },
        ];

        const phases = ['感知彼此', '读取记忆', '此刻相遇'];

        const minLoadTime = 2500;
        const maxLoadTime = 4500;

        // ==================== 逻辑 ====================
        const keywordEl = document.getElementById('keyword');
        const atmosphereEl = document.getElementById('atmosphereText');
        const bottomEl = document.getElementById('bottomText');

        const selected = wordBank[Math.floor(Math.random() * wordBank.length)];
        keywordEl.textContent = selected.keyword;
        atmosphereEl.textContent = selected.text;

        const totalDuration = minLoadTime + Math.random() * (maxLoadTime - minLoadTime);
        const phaseDuration = totalDuration / 3;

        let currentPhase = 0;
        let loadingComplete = false;

        function showPhase(index) {
            if (index >= phases.length) {
                loadingComplete = true;
                bottomEl.textContent = 'A WORLD OF OUR OWN · ' + phases[phases.length - 1];
                bottomEl.classList.add('clickable');
                bottomEl.style.cursor = 'pointer';
                return;
            }

            bottomEl.textContent = 'A WORLD OF OUR OWN · ' + phases[index];
            bottomEl.style.opacity = '0.7';
            
            setTimeout(() => {
                bottomEl.style.opacity = '0.85';
            }, 100);

            currentPhase = index;
        }

        showPhase(0);

        const phaseInterval = setInterval(() => {
            currentPhase++;
            if (currentPhase < phases.length) {
                showPhase(currentPhase);
            } else {
                showPhase(currentPhase);
                clearInterval(phaseInterval);
            }
        }, phaseDuration);

        bottomEl.addEventListener('click', () => {
            if (loadingComplete) {
                window.location.href = 'main.html';
            }
        });
    </script>
</body>
</html>
