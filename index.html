<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通道开启中</title>
    <style>
        /* 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf0f3; /* 基础底色，跟随主题色微调 */
            transition: background 0.8s ease;
        }

        /* ===== 背景层 ===== */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 80%, rgba(212, 160, 181, 0.06), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.8s ease;
        }

        /* ===== 液态玻璃卡片层 ===== */
        .glass-card {
            position: relative;
            z-index: 1;
            width: 88%;
            max-width: 400px;
            aspect-ratio: 3 / 4.5;
            border-radius: 42px;
            /* 液态玻璃核心 */
            background: rgba(255, 255, 255, 0.30);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.50);
            box-shadow: 
                0 20px 60px rgba(212, 160, 181, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.70);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px 24px;
            overflow: hidden;
            transition: all 0.8s ease;
        }

        /* 卡片内部光影 */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -15%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.25), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .glass-card::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 内容容器（在光影上层） ===== */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
        }

        /* ===== 顶部 LOADING ===== */
        .top-line {
            font-size: 12px;
            letter-spacing: 6px;
            font-weight: 300;
            color: #d4a0b5;
            transition: color 0.8s ease;
            margin-top: 4px;
        }
        .top-line span {
            animation: breathe 2.4s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        /* ===== 中部核心 ===== */
        .core-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 6px;
        }

        .main-word {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 54px;
            font-weight: 700;
            font-style: italic;
            color: #d4a0b5;
            transition: color 0.8s ease;
            line-height: 1.1;
            text-shadow: 0 2px 20px rgba(212, 160, 181, 0.10);
        }

        .sub-word {
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #d4a0b5;
            transition: color 0.8s ease;
            opacity: 0.75;
            margin-top: 2px;
        }

        /* ===== 加载条 ===== */
        .progress-wrap {
            width: 70%;
            height: 2px;
            background: rgba(212, 160, 181, 0.15);
            border-radius: 20px;
            margin: 12px 0 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            background: #d4a0b5;
            transition: width 0.3s ease, background 0.8s ease;
            box-shadow: 0 0 12px rgba(212, 160, 181, 0.25);
        }

        /* ===== 底部主行 ===== */
        .bottom-main {
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 300;
            color: #d4a0b5;
            transition: color 0.8s ease;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .bottom-main .phase {
            display: inline-block;
            min-width: 70px;
            transition: opacity 0.6s ease;
        }

        /* ===== 底部装饰 ===== */
        .bottom-deco {
            font-size: 10px;
            letter-spacing: 4px;
            color: #d4a0b5;
            transition: color 0.8s ease;
            opacity: 0.35;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
        }

        /* ===== 花瓣 ===== */
        .petal {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(212, 160, 181, 0.10);
            border-radius: 50% 0 50% 50%;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 0;
            border: 0.5px solid rgba(255, 255, 255, 0.10);
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg) scale(0.6); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.2; }
            100% { transform: translateY(600px) rotate(360deg) scale(1.1); opacity: 0; }
        }

        /* ===== 细闪 ===== */
        .glint {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.70);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.9; transform: scale(1.8); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 420px) {
            .glass-card { padding: 24px 16px 20px; border-radius: 34px; }
            .main-word { font-size: 40px; }
            .sub-word { font-size: 13px; }
            .top-line { font-size: 11px; letter-spacing: 4px; }
            .bottom-main { font-size: 12px; }
            .bottom-deco { font-size: 9px; letter-spacing: 3px; }
            .progress-wrap { width: 65%; }
        }
        @media (max-width: 360px) {
            .main-word { font-size: 32px; }
            .sub-word { font-size: 12px; }
            .top-line { font-size: 10px; letter-spacing: 3px; }
            .bottom-main { font-size: 11px; }
            .glass-card { padding: 20px 12px 16px; border-radius: 28px; }
        }
    </style>
</head>
<body>

    <!-- 背景层 -->
    <div class="bg-layer" id="bgLayer"></div>

    <!-- 液态玻璃卡片 -->
    <div class="glass-card" id="glassCard">
        <!-- 花瓣 & 细闪容器 -->
        <div id="petalsContainer"></div>
        <div id="glintsContainer"></div>

        <!-- 内容 -->
        <div class="content">
            <!-- 顶部 -->
            <div class="top-line"><span>✦ &nbsp; L O A D I N G &nbsp; ✦</span></div>

            <!-- 中部 -->
            <div class="core-area">
                <div class="main-word" id="mainWord">Lucky</div>
                <div class="sub-word" id="subWord">此生最大的幸运</div>
            </div>

            <!-- 加载条 -->
            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <!-- 底部主行 -->
            <div class="bottom-main">
                A WORLD OF OUR OWN · <span class="phase" id="phaseText">感知彼此</span>
            </div>

            <!-- 底部装饰 -->
            <div class="bottom-deco" id="decoText">☆.。.:*・°☆.。.:*・°☆.。.:*・°☆.。.:*・°☆</div>
        </div>
    </div>

    <script>
        // ===== 配置 =====
        const CONFIG = {
            themeColor: '#d4a0b5',
            loadDuration: 4000,
            phaseInterval: 1300,
            wordPairs: [
                { en: 'Lucky', zh: '此生最大的幸运' },
                { en: 'Echo', zh: '回应我的呼唤' },
                { en: 'Dream', zh: '在梦中相遇' },
                { en: 'Heart', zh: '为你跳动的心' },
                { en: 'Star', zh: '指引你的星光' },
                { en: 'Moon', zh: '月光下的约定' },
                { en: 'Soul', zh: '灵魂的共鸣' },
                { en: 'Light', zh: '照亮你的路' }
            ],
            phases: ['感知彼此', '读取记忆', '此刻相遇'],
            decos: [
                '☆.。.:*・°☆.。.:*・°☆.。.:*・°☆.。.:*・°☆',
                '⋆｡ﾟ☁︎｡⋆｡ ﾟ☾ ﾟ｡⋆ ⁺ﾟ ☁︎｡₊ ⋆ ☾ ⋆⁺₊⋆ ☁︎⋆｡ﾟ'
            ]
        };

        // ===== DOM =====
        const mainWord = document.getElementById('mainWord');
        const subWord = document.getElementById('subWord');
        const progressBar = document.getElementById('progressBar');
        const phaseText = document.getElementById('phaseText');
        const decoText = document.getElementById('decoText');
        const glassCard = document.getElementById('glassCard');
        const bgLayer = document.getElementById('bgLayer');

        // ===== 更新主题 =====
        function setTheme(color) {
            CONFIG.themeColor = color;
            const els = [
                document.querySelector('.top-line'),
                document.querySelector('.main-word'),
                document.querySelector('.sub-word'),
                document.querySelector('.bottom-main'),
                document.querySelector('.bottom-deco'),
                document.querySelector('.progress-bar')
            ];
            els.forEach(el => { if (el) el.style.color = color; });
            progressBar.style.background = color;
            progressBar.style.boxShadow = `0 0 12px ${color}30`;
            glassCard.style.borderColor = `rgba(255,255,255,0.50)`;
            glassCard.style.boxShadow = `0 20px 60px ${color}12, inset 0 1px 0 rgba(255,255,255,0.70)`;
            document.querySelectorAll('.petal').forEach(p => {
                p.style.background = `${color}15`;
            });
            bgLayer.style.background = `radial-gradient(ellipse at 50% 80%, ${color}12, transparent 70%)`;
            document.body.style.background = `color-mix(in srgb, ${color} 6%, #faf0f3)`;
        }

        // ===== 花瓣 =====
        function createPetals() {
            const c = document.getElementById('petalsContainer');
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                const s = 6 + Math.random() * 10;
                p.style.width = s + 'px';
                p.style.height = s + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = 10 + Math.random() * 14 + 's';
                p.style.animationDelay = Math.random() * 14 + 's';
                p.style.transform = `rotate(${Math.random() * 360}deg)`;
                c.appendChild(p);
            }
        }

        // ===== 细闪 =====
        function createGlints() {
            const c = document.getElementById('glintsContainer');
            for (let i = 0; i < 30; i++) {
                const g = document.createElement('div');
                g.className = 'glint';
                g.style.left = Math.random() * 100 + '%';
                g.style.top = Math.random() * 100 + '%';
                g.style.animationDuration = 2 + Math.random() * 4 + 's';
                g.style.animationDelay = Math.random() * 6 + 's';
                g.style.width = 2 + Math.random() * 3 + 'px';
                g.style.height = g.style.width;
                c.appendChild(g);
            }
        }

        // ===== 加载流程 =====
        function startLoading() {
            // 随机词对
            const pair = CONFIG.wordPairs[Math.floor(Math.random() * CONFIG.wordPairs.length)];
            mainWord.textContent = pair.en;
            subWord.textContent = pair.zh;

            // 随机底部装饰
            decoText.textContent = CONFIG.decos[Math.floor(Math.random() * CONFIG.decos.length)];

            progressBar.style.width = '0%';

            // 三阶段切换
            let phaseIndex = 0;
            const phaseInterval = setInterval(() => {
                phaseIndex++;
                if (phaseIndex < CONFIG.phases.length) {
                    phaseText.textContent = CONFIG.phases[phaseIndex];
                    phaseText.style.opacity = '0';
                    setTimeout(() => { phaseText.style.opacity = '1'; }, 50);
                } else {
                    clearInterval(phaseInterval);
                }
            }, CONFIG.phaseInterval);

            // 进度条
            let progress = 0;
            const step = 100 / (CONFIG.loadDuration / 50);
            const progressInterval = setInterval(() => {
                progress += step;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                    setTimeout(() => {
                        alert('加载完成，即将进入今日页面...');
                    }, 300);
                }
                progressBar.style.width = progress + '%';
            }, 50);
        }

        // ===== 初始化 =====
        function init() {
            createPetals();
            createGlints();
            setTheme(CONFIG.themeColor);
            startLoading();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
