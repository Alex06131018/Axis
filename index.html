<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在加载...</title>
    <style>
        :root { --theme: #d4a0b5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #ffffff 0%, #fff5f7 40%, #fce8ef 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
            cursor: default; -webkit-user-select: none; user-select: none; position: relative;
        }
        .sparkles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .sparkle {
            position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.8);
            animation: spark 1.4s ease-in-out infinite;
        }
        @keyframes spark {
            0%,100% { opacity: 0; transform: scale(0.2); }
            40% { opacity: 1; transform: scale(1.2); }
            60% { opacity: 0.8; transform: scale(0.7); }
        }
        .petals { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .petal {
            position: absolute; top: -35px;
            background: radial-gradient(ellipse at 30% 30%, #f0c8d6 0%, #e2a8b8 60%, #d490a5 100%);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            30% { transform: translateY(30vh) rotate(120deg) translateX(45px); opacity: 0.5; }
            60% { transform: translateY(60vh) rotate(240deg) translateX(-45px); opacity: 0.3; }
            85% { transform: translateY(85vh) rotate(320deg) translateX(25px); opacity: 0.1; }
            100% { transform: translateY(105vh) rotate(360deg) translateX(-15px); opacity: 0; }
        }
        .glass {
            position: relative; z-index: 1;
            background: linear-gradient(180deg, rgba(255,240,245,0.5) 0%, rgba(255,255,255,0.35) 40%, rgba(255,255,255,0.4) 100%);
            backdrop-filter: blur(55px); -webkit-backdrop-filter: blur(55px);
            border-radius: 36px;
            border: 0.8px solid rgba(255,255,255,0.4);
            box-shadow: 0 20px 55px rgba(180,130,150,0.06), inset 0 2px 8px rgba(255,255,255,0.3);
            padding: 72px 36px 55px; display: flex; flex-direction: column; align-items: center;
            gap: 16px; text-align: center; width: 82vw; max-width: 340px; overflow: hidden;
        }
        .line1 { color: var(--theme); font-size: 10px; letter-spacing: 2px; white-space: nowrap; opacity: 0.85; }
        .keyword {
            color: var(--theme); font-size: 36px; letter-spacing: 9px; font-weight: bold;
            font-family: 'Times New Roman','Georgia',serif; animation: pulse 2.5s ease-in-out infinite;
            transform: scaleY(1.15);
        }
        @keyframes pulse {
            0%,100% { opacity: 0.75; transform: scaleY(1.15) scale(1); }
            50% { opacity: 1; transform: scaleY(1.15) scale(1.04); }
        }
        .sentence { color: var(--theme); font-size: 10px; letter-spacing: 3px; font-weight: 300; opacity: 0.85; }
        .loader-wrap { width: 100%; height: 44px; position: relative; }
        .loader-track {
            position: absolute; top: 50%; left: 0; width: 100%; height: 3px;
            background: rgba(212,160,181,0.3); transform: translateY(-50%); border-radius: 3px;
        }
        .loader-light {
            position: absolute; top: 50%; left: 0; height: 3px; width: 30%;
            background: linear-gradient(90deg, transparent 0%, #fff 30%, #fff 70%, transparent 100%);
            transform: translateY(-50%); border-radius: 3px;
            box-shadow: 0 0 12px #fff, 0 0 24px rgba(255,255,255,0.8);
            animation: flowLight 2.2s ease-in-out infinite; z-index: 1;
        }
        @keyframes flowLight {
            0% { left: -30%; }
            100% { left: 100%; }
        }
        .bottom { color: var(--theme); font-size: 12px; letter-spacing: 3px; white-space: nowrap; margin-top: 8px; opacity: 0.9; }
        .deco-line { color: var(--theme); font-size: 8px; letter-spacing: 1px; white-space: nowrap; opacity: 0.7; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="sparkles" id="sparkles"></div>
    <div class="petals" id="petals"></div>

    <div class="glass" id="glass">
        <div class="line1">* . ꒰ 𓆩 &nbsp; L &nbsp; O &nbsp; A &nbsp; D &nbsp; I &nbsp; N &nbsp; G &nbsp; 𓆪 ꒱ . *</div>
        <div class="keyword" id="keyword">𝓛𝓾𝓬𝓴𝔂</div>
        <div class="sentence" id="sentence">此生最大的幸运</div>
        <div class="loader-wrap">
            <div class="loader-track"></div>
            <div class="loader-light"></div>
        </div>
        <div class="bottom" id="bottom">A WORLD OF OUR OWN · 感知彼此</div>
        <div class="deco-line" id="decoLine">☆.。.:*・°☆.。.:*・°☆.。.:*・°☆.。.:*・°☆</div>
    </div>

    <script>
        (function() {
            var sBox = document.getElementById('sparkles');
            for (var i = 0; i < 800; i++) {
                var sp = document.createElement('div'); sp.className = 'sparkle';
                sp.style.left = Math.random() * 98 + '%';
                sp.style.top = Math.random() * 98 + '%';
                sp.style.animationDelay = Math.random() * 3 + 's';
                sp.style.animationDuration = (1 + Math.random() * 2) + 's';
                sBox.appendChild(sp);
            }
            var pBox = document.getElementById('petals');
            for (var i = 0; i < 30; i++) {
                var p = document.createElement('div'); p.className = 'petal';
                var s = 7 + Math.random() * 13;
                p.style.width = s + 'px'; p.style.height = s * 0.65 + 'px';
                p.style.left = Math.random() * 96 + '%';
                p.style.animationDuration = (7 + Math.random() * 10) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.opacity = 0.3 + Math.random() * 0.4;
                p.style.borderRadius = (45+Math.random()*20)+'% '+(2+Math.random()*12)+'% '+(35+Math.random()*25)+'% '+(2+Math.random()*12)+'%';
                pBox.appendChild(p);
            }
            var words = [
                { k: '𝓛𝓾𝓬𝓴𝔂', t: '此生最大的幸运' },
                { k: '𝓢𝓽𝓪𝓻𝓵𝓲𝓰𝓱𝓽', t: '星光指引我来见你' },
                { k: '𝓢𝓮𝓻𝓮𝓷𝓭𝓲𝓹𝓲𝓽𝔂', t: '遇见你是最美的意外' },
                { k: '𝓓𝓮𝓼𝓽𝓲𝓷𝔂', t: '命中注定的相遇' },
                { k: '𝓔𝓽𝓮𝓻𝓷𝓲𝓽𝔂', t: '在时间的尽头等你' },
                { k: '𝓜𝓸𝓸𝓷𝓵𝓲𝓰𝓱𝓽', t: '月光洒在你我之间' },
                { k: '𝓕𝓸𝓻𝓮𝓿𝓮𝓻', t: '永远有多远，就有多近' },
                { k: '𝓜𝓮𝓶𝓸𝓻𝔂', t: '每一帧回忆都是你' }
            ];
            var phases = ['感知彼此', '读取记忆', '此刻相遇'];
            var pick = words[Math.floor(Math.random() * words.length)];
            document.getElementById('keyword').textContent = pick.k;
            document.getElementById('sentence').textContent = pick.t;
            var decoLine = document.getElementById('decoLine');
            var decos = ['☆.。.:*・°☆.。.:*・°☆.。.:*・°☆.。.:*・°☆', '⋆｡ﾟ☁︎｡⋆｡ ﾟ☾ ﾟ｡⋆ ⁺ﾟ ☁︎｡₊ ⋆ ☾ ⋆⁺₊⋆ ☁︎⋆｡ﾟ'];
            decoLine.textContent = decos[Math.floor(Math.random() * 2)];
            var bottom = document.getElementById('bottom');
            var time = 3000 + Math.random() * 2000;
            var step = time / 3;
            var idx = 0, done = false;
            function showPhase(i) {
                if (i >= phases.length) { done = true; bottom.textContent = 'A WORLD OF OUR OWN · ' + phases[phases.length - 1]; return; }
                bottom.textContent = 'A WORLD OF OUR OWN · ' + phases[i]; idx = i;
            }
            showPhase(0);
            setInterval(function() { idx++; if (idx < phases.length) showPhase(idx); }, step);
            bottom.addEventListener('click', function() { if (done) window.location.href = 'main.html'; });
        })();
    </script>
</body>
</html>
