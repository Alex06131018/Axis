<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通道开启中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5edf0; /* 基础底色，会被主题色覆盖 */
            transition: background 0.8s ease;
        }

        /* ===== 液态玻璃容器 ===== */
        .glass-loader {
            width: 100%;
            max-width: 380px;
            margin: 20px;
            padding: 40px 20px 30px;
            border-radius: 38px;
            /* 液态玻璃核心 */
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.50);
            box-shadow:
                0 20px 60px rgba(212, 160, 181, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.80),
                inset 0 -1px 0 rgba(255, 255, 255, 0.20);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 560px;
            position: relative;
            overflow: hidden;
            transition: all 0.8s ease;
        }

        /* ===== 玻璃内部光影 ===== */
        .glass-loader::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.30), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.8s ease;
        }

        .glass-loader::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.8s ease;
        }

        /* ===== 顶部 LOADING ===== */
        .top-line {
            font-size: 12px;
            letter-spacing: 6px;
            font-weight: 300;
            color: #d4a0b5;
            transition: color 0.8s ease;
            margin-top: 10px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 20px rgba(212, 160, 181, 0.10);
        }
        .top-line span {
            animation: breathe 2.4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        /* ===== 中部核心 ===== */
        .core-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .main-word {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 54px;
            font-weight: 700;
            font-style: italic;
            color: #d4a0b5;
            transition: color 0.8s ease;
            line-height: 1.1;
            text-shadow: 0 2px 30px rgba(212, 160, 181, 0.15);
            margin-bottom: 10px;
        }

        .sub-word {
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #d4a0b5;
            transition: color 0.8s ease;
            opacity: 0.75;
        }

        /* ===== 加载条 ===== */
        .progress-wrap {
            width: 80%;
            height: 3px;
            background: rgba(212, 160, 181, 0.15);
            border-radius: 20px;
            margin: 20px 0 10px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            background: #d4a0b5;
            transition: width 0.3s ease, background 0.8s ease;
            box-shadow: 0 0 16px rgba(212, 160, 181, 0.30);
        }

        /* ===== 底部 ===== */
        .bottom-line {
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 300;
            color: #d4a0b5;
            transition: color 0.8s ease;
            position: relative;
            z-index: 1;
            text-align: center;
            line-height: 1.6;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(212, 160, 181, 0.05);
        }

        .bottom-line .phase {
            display: inline-block;
            min-width: 80px;
            transition: opacity 0.6s ease;
        }

        .bottom-stars {
            margin-top: 8px;
            font-size: 10px;
            letter-spacing: 6px;
            color: #d4a0b5;
            transition: color 0.8s ease;
            opacity: 0.35;
            position: relative;
            z-index: 1;
        }

        /* ===== 花瓣飘落（液态玻璃质感） ===== */
        .petal {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(212, 160, 181, 0.12);
            border-radius: 50% 0 50% 50%;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 0;
            backdrop-filter: blur(2px);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
        }

        @keyframes fall {
            0% {
                transform: translateY(-30px) rotate(0deg) scale(0.6);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(700px) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        /* ===== 细闪粒子 ===== */
        .glint {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.70);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 3s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.9; transform: scale(1.8); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 420px) {
            .glass-loader {
                min-height: 480px;
                padding: 30px 16px 20px;
                border-radius: 30px;
            }
            .main-word { font-size: 42px; }
            .sub-word { font-size: 14px; }
            .top-line { font-size: 11px; letter-spacing: 4px; }
            .bottom-line { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="glass-loader" id="loader">
        <!-- 花瓣 & 细闪容器 -->
        <div id="petals-container"></div>
        <div id="glints-container"></div>

        <!-- 顶部 -->
        <div class="top-line"><span>✦ &nbsp; L O A D I N G &nbsp; ✦</span></div>

        <!-- 中部核心 -->
        <div class="core-area">
            <div class="main-word" id="mainWord">Lucky</div>
            <div class="sub-word" id="subWord">此生最大的幸运</div>
        </div>

        <!-- 加载条 -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 底部 -->
        <div class="bottom-line">
            A WORLD OF OUR OWN · <span class="phase" id="phaseText">感知彼此</span>
        </div>
        <div class="bottom-stars">✧ &nbsp; . &nbsp; ✧ &nbsp; . &nbsp; ✧ &nbsp; . &nbsp; ✧ &nbsp; . &nbsp; ✧</div>
    </div>

    <script>
        // ===== 配置 =====
        const CONFIG = {
            themeColor: '#d4a0b5',
            loadDuration: 4000,
            phaseInterval: 1300,
            wordPairs: [
                { en: 'Lucky', zh: '此生最大的幸运' },
                { en: 'Echo', zh: '回应我的呼唤' },
                { en: 'Dream', zh: '在梦中相遇' },
                { en: 'Heart', zh: '为你跳动的心' },
                { en: 'Star', zh: '指引你的星光' },
                { en: 'Moon', zh: '月光下的约定' },
                { en: 'Soul', zh: '灵魂的共鸣' },
                { en: 'Light', zh: '照亮你的路' }
            ],
            phases: ['感知彼此', '读取记忆', '此刻相遇']
        };

        // ===== DOM =====
        const loader = document.getElementById('loader');
        const mainWord = document.getElementById('mainWord');
        const subWord = document.getElementById('subWord');
        const progressBar = document.getElementById('progressBar');
        const phaseText = document.getElementById('phaseText');

        // ===== 更新主题色 =====
        function setTheme(color) {
            CONFIG.themeColor = color;
            const els = [
                document.querySelector('.top-line'),
                document.querySelector('.main-word'),
                document.querySelector('.sub-word'),
                document.querySelector('.bottom-line'),
                document.querySelector('.bottom-stars'),
                document.querySelector('.progress-bar')
            ];
            els.forEach(el => { if (el) el.style.color = color; });
            progressBar.style.background = color;
            progressBar.style.boxShadow = `0 0 16px ${color}40`;
            loader.style.borderColor = `rgba(255,255,255,0.50)`;
            loader.style.boxShadow = `0 20px 60px ${color}15, inset 0 1px 0 rgba(255,255,255,0.80)`;
            document.querySelectorAll('.petal').forEach(p => {
                p.style.background = `${color}15`;
            });
            document.body.style.background = `color-mix(in srgb, ${color} 8%, #f5edf0)`;
        }

        // ===== 生成花瓣 =====
        function createPetals() {
            const c = document.getElementById('petals-container');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                const s = 6 + Math.random() * 10;
                p.style.width = s + 'px';
                p.style.height = s + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = 10 + Math.random() * 14 + 's';
                p.style.animationDelay = Math.random() * 14 + 's';
                p.style.transform = `rotate(${Math.random() * 360}deg)`;
                c.appendChild(p);
            }
        }

        // ===== 生成细闪 =====
        function createGlints() {
            const c = document.getElementById('glints-container');
            for (let i = 0; i < 35; i++) {
                const g = document.createElement('div');
                g.className = 'glint';
                g.style.left = Math.random() * 100 + '%';
                g.style.top = Math.random() * 100 + '%';
                g.style.animationDuration = 2 + Math.random() * 4 + 's';
                g.style.animationDelay = Math.random() * 6 + 's';
                g.style.width = 2 + Math.random() * 3 + 'px';
                g.style.height = g.style.width;
                c.appendChild(g);
            }
        }

        // ===== 加载流程 =====
        function startLoading() {
            const pair = CONFIG.wordPairs[Math.floor(Math.random() * CONFIG.wordPairs.length)];
            mainWord.textContent = pair.en;
            subWord.textContent = pair.zh;

            progressBar.style.width = '0%';

            let phaseIndex = 0;
            const phaseInterval = setInterval(() => {
                phaseIndex++;
                if (phaseIndex < CONFIG.phases.length) {
                    phaseText.textContent = CONFIG.phases[phaseIndex];
                    phaseText.style.opacity = '0';
                    setTimeout(() => { phaseText.style.opacity = '1'; }, 50);
                } else {
                    clearInterval(phaseInterval);
                }
            }, CONFIG.phaseInterval);

            let progress = 0;
            const step = 100 / (CONFIG.loadDuration / 50);
            const progressInterval = setInterval(() => {
                progress += step;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                    setTimeout(() => {
                        alert('加载完成！即将进入今日页面...');
                    }, 300);
                }
                progressBar.style.width = progress + '%';
            }, 50);
        }

        // ===== 初始化 =====
        function init() {
            createPetals();
            createGlints();
            setTheme(CONFIG.themeColor);
            startLoading();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
