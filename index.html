<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在加载...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #fdf6f8 0%, #fce8ef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Times New Roman', 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
            overflow: hidden;
            cursor: default;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
        }

        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .petal {
            position: absolute;
            top: -30px;
            background: #e8b4c4;
            border-radius: 50% 0 50% 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            30% {
                transform: translateY(30vh) rotate(120deg) translateX(40px);
                opacity: 0.5;
            }
            60% {
                transform: translateY(60vh) rotate(240deg) translateX(-40px);
                opacity: 0.3;
            }
            85% {
                transform: translateY(85vh) rotate(320deg) translateX(20px);
                opacity: 0.1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg) translateX(-10px);
                opacity: 0;
            }
        }

        .loading-box {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
            padding: 40px 20px;
        }

        .line1 {
            color: #c9a0a0;
            font-size: 11px;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        .keyword {
            color: #c9a0a0;
            font-size: 40px;
            letter-spacing: 5px;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.04); }
        }

        .sentence {
            color: #c9a0a0;
            font-size: 17px;
            letter-spacing: 3px;
            font-family: 'STSong', 'Songti SC', 'SimSun', '宋体', serif;
        }

        .loader {
            width: 240px;
            height: 2px;
            background: rgba(201, 160, 160, 0.2);
            border-radius: 2px;
            position: relative;
            margin: 8px 0;
        }

        .loader .track {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 2px;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.9), 0 0 14px rgba(255, 255, 255, 0.5);
            animation: trackGrow 2.5s ease-in-out infinite;
        }

        .loader .dot {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 35px rgba(255, 255, 255, 0.7);
            animation: dotMove 2.5s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes trackGrow {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes dotMove {
            0% { left: 0%; }
            100% { left: 100%; }
        }

        .bottom {
            color: #c9a0a0;
            font-size: 12px;
            letter-spacing: 3px;
            white-space: nowrap;
            margin-top: 24px;
            text-shadow: 0 0 6px #d4a0b5, 0 0 14px #d4a0b5;
        }

        .bottom.done {
            cursor: pointer;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 6px #d4a0b5, 0 0 14px #d4a0b5; }
            50% { text-shadow: 0 0 12px #d4a0b5, 0 0 26px #d4a0b5; }
        }
    </style>
</head>
<body>
    <div class="petals" id="petals"></div>

    <div class="loading-box">
        <div class="line1">* . ꒰ 𓆩 &nbsp; L &nbsp; O &nbsp; A &nbsp; D &nbsp; I &nbsp; N &nbsp; G &nbsp; 𓆪 ꒱ . *</div>
        <div class="keyword" id="keyword">Lucky</div>
        <div class="sentence" id="sentence">此生最大的幸运</div>
        <div class="loader">
            <div class="track"></div>
            <div class="dot"></div>
        </div>
        <div class="bottom" id="bottom">A WORLD OF OUR OWN . 感知彼此</div>
    </div>

    <script>
        (function() {
            var petalsBox = document.getElementById('petals');
            for (var i = 0; i < 30; i++) {
                var p = document.createElement('div');
                p.className = 'petal';
                var s = 5 + Math.random() * 12;
                p.style.width = s + 'px';
                p.style.height = s * 0.75 + 'px';
                p.style.left = Math.random() * 96 + '%';
                p.style.animationDuration = (7 + Math.random() * 9) + 's';
                p.style.animationDelay = Math.random() * 6 + 's';
                p.style.opacity = 0.3 + Math.random() * 0.35;
                petalsBox.appendChild(p);
            }

            var words = [
                { k: 'Lucky', t: '此生最大的幸运' },
                { k: 'Starlight', t: '星光指引我来见你' },
                { k: 'Serendipity', t: '遇见你是最美的意外' },
                { k: 'Destiny', t: '命中注定的相遇' },
                { k: 'Eternity', t: '在时间的尽头等你' },
                { k: 'Moonlight', t: '月光洒在你我之间' },
                { k: 'Forever', t: '永远有多远，就有多近' },
                { k: 'Memory', t: '每一帧回忆都是你' }
            ];

            var phases = ['感知彼此', '读取记忆', '此刻相遇'];

            var pick = words[Math.floor(Math.random() * words.length)];
            document.getElementById('keyword').textContent = pick.k;
            document.getElementById('sentence').textContent = pick.t;

            var bottom = document.getElementById('bottom');
            var time = 2500 + Math.random() * 2000;
            var step = time / 3;
            var idx = 0;
            var done = false;

            function show(i) {
                if (i >= phases.length) {
                    done = true;
                    bottom.textContent = 'A WORLD OF OUR OWN . ' + phases[phases.length - 1];
                    bottom.classList.add('done');
                    return;
                }
                bottom.textContent = 'A WORLD OF OUR OWN . ' + phases[i];
                idx = i;
            }

            show(0);

            var timer = setInterval(function() {
                idx++;
                if (idx < phases.length) {
                    show(idx);
                } else if (idx === phases.length) {
                    show(idx);
                    clearInterval(timer);
                }
            }, step);

            bottom.addEventListener('click', function() {
                if (done) window.location.href = 'main.html';
            });
        })();
    </script>
</body>
</html>
