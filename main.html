<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中...</title>
    <style>
        :root {
            --theme: #d4a0b5;
            --glass-bg: rgba(255, 255, 255, 0.25);
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 背景 - 渐变粉 + 细闪 + 花瓣 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #fef5f8 0%, #fce8f0 35%, #f2d4df 100%);
            z-index: 0;
        }

        /* 细闪效果 */
        .sparkle {
            position: fixed;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: sparkleAnim 3s ease-in-out infinite;
            z-index: 1;
        }
        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.9; transform: scale(1); }
        }

        /* 花瓣容器 */
        .petals-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .petal {
            position: absolute;
            top: -35px;
            background: radial-gradient(ellipse at 30% 30%, #f0c8d6 0%, #e2a8b8 60%, #d490a5 100%);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.65; }
            30% { transform: translateY(30vh) rotate(120deg) translateX(50px); opacity: 0.5; }
            60% { transform: translateY(60vh) rotate(240deg) translateX(-50px); opacity: 0.3; }
            85% { transform: translateY(85vh) rotate(320deg) translateX(30px); opacity: 0.1; }
            100% { transform: translateY(105vh) rotate(360deg) translateX(-15px); opacity: 0; }
        }

        /* 液态玻璃卡片 */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 88vw;
            max-width: 380px;
            padding: 45px 35px 35px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 45px rgba(180, 130, 150, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
            overflow: hidden;
        }
        /* 液态玻璃上下光晕 */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 8px; left: 15px; right: 15px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            filter: blur(2px);
        }
        .glass-card::after {
            content: '';
            position: absolute;
            bottom: 8px; left: 15px; right: 15px;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 3px;
            filter: blur(2px);
        }

        /* 第一行 - 特殊符号缩小 */
        .line1 {
            color: var(--theme);
            font-size: 10px;
            letter-spacing: 4px;
            white-space: nowrap;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* 关键词 - 花体间隔 */
        .keyword {
            color: var(--theme);
            font-size: 36px;
            letter-spacing: 8px;
            font-weight: normal;
            font-family: 'Times New Roman', 'Georgia', serif;
            text-indent: 5px;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.75; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.04); }
        }

        /* 句子 - 无衬线缩小 */
        .sentence {
            color: var(--theme);
            font-size: 13px;
            letter-spacing: 3px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-weight: 300;
            opacity: 0.85;
        }

        /* 加载条区域 */
        .loader-wrap {
            width: 100%;
            height: 40px;
            position: relative;
            margin: 6px 0;
        }
        .loader-bg {
            position: absolute;
            top: 50%; left: 0;
            width: 100%; height: 1px;
            background: rgba(212, 160, 181, 0.45);
            transform: translateY(-50%);
        }
        .loader-glow {
            position: absolute;
            top: 50%; left: 0;
            height: 1.5px;
            width: 0%;
            background: #fff;
            transform: translateY(-50%);
            border-radius: 1px;
            box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,255,255,0.7);
            z-index: 2;
            transition: width 0.05s linear;
        }
        .wave-svg {
            position: absolute;
            top: 50%; left: 0;
            width: 100%; height: 24px;
            transform: translateY(-50%);
            z-index: 1;
        }
        .wave-dark {
            stroke: rgba(212, 160, 181, 0.45);
            fill: none;
            stroke-width: 1;
        }
        .wave-light {
            stroke: #fff;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
        }
        .dot {
            position: absolute;
            top: 50%; left: 0%;
            width: 11px; height: 11px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 14px #fff, 0 0 28px #fff, 0 0 45px rgba(255,255,255,0.5);
            z-index: 3;
            transition: left 0.05s linear;
        }

        /* 底部文字 - 微光 */
        .bottom {
            color: var(--theme);
            font-size: 12px;
            letter-spacing: 3px;
            white-space: nowrap;
            margin-top: 18px;
            text-shadow: 0 0 3px #d4a0b5, 0 0 6px #d4a0b5;
            opacity: 0.9;
        }
        .bottom.done {
            cursor: pointer;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 3px #d4a0b5, 0 0 6px #d4a0b5; }
            50% { text-shadow: 0 0 6px #d4a0b5, 0 0 12px #d4a0b5; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <!-- 细闪 -->
    <div id="sparklesContainer"></div>

    <!-- 花瓣 -->
    <div class="petals-container" id="petalsContainer"></div>

    <!-- 液态玻璃卡片 -->
    <div class="glass-card">
        <div class="line1">* . ꒰ 𓆩 &nbsp; L &nbsp; O &nbsp; A &nbsp; D &nbsp; I &nbsp; N &nbsp; G &nbsp; 𓆪 ꒱ . *</div>
        <div class="keyword" id="keyword">𝓛𝓾𝓬𝓴𝔂</div>
        <div class="sentence" id="sentence">此生最大的幸运</div>

        <div class="loader-wrap" id="loaderWrap">
            <div class="loader-bg"></div>
            <svg class="wave-svg" viewBox="0 0 300 24" preserveAspectRatio="none">
                <path class="wave-dark" d="M0,12 Q15,3 30,12 Q45,21 60,12 Q75,3 90,12 Q105,21 120,12 Q135,3 150,12 Q165,21 180,12 Q195,3 210,12 Q225,21 240,12 Q255,3 270,12 Q285,21 300,12"/>
                <path class="wave-light" id="waveLight" d="M0,12 Q15,3 30,12 Q45,21 60,12 Q75,3 90,12 Q105,21 120,12 Q135,3 150,12 Q165,21 180,12 Q195,3 210,12 Q225,21 240,12 Q255,3 270,12 Q285,21 300,12"/>
            </svg>
            <div class="loader-glow" id="loaderGlow"></div>
            <div class="dot" id="dot"></div>
        </div>

        <div class="bottom" id="bottom">A WORLD OF OUR OWN · 感知彼此</div>
    </div>

    <script>
        (function() {
            // 1. 细闪生成
            const sparklesBox = document.getElementById('sparklesContainer');
            for (let i = 0; i < 45; i++) {
                const sp = document.createElement('div');
                sp.className = 'sparkle';
                sp.style.left = Math.random() * 96 + '%';
                sp.style.top = Math.random() * 96 + '%';
                sp.style.animationDelay = Math.random() * 4 + 's';
                sp.style.animationDuration = (2 + Math.random() * 3) + 's';
                sparklesBox.appendChild(sp);
            }

            // 2. 花瓣生成
            const petalsBox = document.getElementById('petalsContainer');
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                const s = 7 + Math.random() * 13;
                p.style.width = s + 'px';
                p.style.height = s * 0.65 + 'px';
                p.style.left = Math.random() * 96 + '%';
                p.style.animationDuration = (7 + Math.random() * 10) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.opacity = 0.3 + Math.random() * 0.4;
                p.style.borderRadius = (45 + Math.random() * 20) + '% ' + (2 + Math.random() * 12) + '% ' + (35 + Math.random() * 25) + '% ' + (2 + Math.random() * 12) + '%';
                petalsBox.appendChild(p);
            }

            // 3. 词库
            const words = [
                { k: '𝓛𝓾𝓬𝓴𝔂', t: '此生最大的幸运' },
                { k: '𝓢𝓽𝓪𝓻𝓵𝓲𝓰𝓱𝓽', t: '星光指引我来见你' },
                { k: '𝓢𝓮𝓻𝓮𝓷𝓭𝓲𝓹𝓲𝓽𝔂', t: '遇见你是最美的意外' },
                { k: '𝓓𝓮𝓼𝓽𝓲𝓷𝔂', t: '命中注定的相遇' },
                { k: '𝓔𝓽𝓮𝓻𝓷𝓲𝓽𝔂', t: '在时间的尽头等你' },
                { k: '𝓜𝓸𝓸𝓷𝓵𝓲𝓰𝓱𝓽', t: '月光洒在你我之间' },
                { k: '𝓕𝓸𝓻𝓮𝓿𝓮𝓻', t: '永远有多远，就有多近' },
                { k: '𝓜𝓮𝓶𝓸𝓻𝔂', t: '每一帧回忆都是你' }
            ];
            const phases = ['感知彼此', '读取记忆', '此刻相遇'];

            const pick = words[Math.floor(Math.random() * words.length)];
            document.getElementById('keyword').textContent = pick.k;
            document.getElementById('sentence').textContent = pick.t;

            // 4. 底部三阶段
            const bottom = document.getElementById('bottom');
            const time = 3000 + Math.random() * 2000;
            const step = time / 3;
            let idx = 0;
            let done = false;

            function showPhase(i) {
                if (i >= phases.length) {
                    done = true;
                    bottom.textContent = 'A WORLD OF OUR OWN · ' + phases[phases.length - 1];
                    bottom.classList.add('done');
                    return;
                }
                bottom.textContent = 'A WORLD OF OUR OWN · ' + phases[i];
                idx = i;
            }
            showPhase(0);
            const phaseTimer = setInterval(() => {
                idx++;
                if (idx < phases.length) {
                    showPhase(idx);
                } else {
                    showPhase(idx);
                    clearInterval(phaseTimer);
                }
            }, step);

            bottom.addEventListener('click', () => {
                if (done) window.location.href = 'main.html'; // 暂时循环
            });

            // 5. 加载条联控（光球光晕走到头停住并消失）
            const dot = document.getElementById('dot');
            const glow = document.getElementById('loaderGlow');
            const waveLight = document.getElementById('waveLight');
            const wrap = document.getElementById('loaderWrap');
            const totalLen = 300;
            waveLight.style.strokeDasharray = totalLen;
            waveLight.style.strokeDashoffset = totalLen;

            const startTime = Date.now();
            let animationId;

            function anim() {
                const elapsed = Date.now() - startTime;
                const pct = Math.min(elapsed / time, 1);
                const wrapW = wrap.clientWidth;
                dot.style.left = (pct * wrapW) + 'px';
                glow.style.width = (pct * 100) + '%';
                const offset = totalLen - (pct * totalLen);
                waveLight.style.strokeDashoffset = offset;

                if (pct >= 1) {
                    // 结束：让高亮部分逐渐变暗（消失）
                    setTimeout(() => {
                        glow.style.transition = 'opacity 1s';
                        dot.style.transition = 'opacity 1s';
                        glow.style.opacity = '0';
                        dot.style.opacity = '0.2';
                    }, 50);
                } else {
                    requestAnimationFrame(anim);
                }
            }
            requestAnimationFrame(anim);
        })();
    </script>
</body>
</html>
