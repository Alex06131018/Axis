<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCKY DAY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }
        .today-page {
            width: 100%;
            max-width: 400px;
            padding: 20px 16px;
            position: relative;
            min-height: 100vh;
        }
        /* 顶部渐变区 */
        .top-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: linear-gradient(180deg, #d4a0b5 0%, #fcf5f8 100%);
            z-index: 0;
            transition: background 0.8s ease;
        }
        /* 内容在渐变之上 */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* 日期卡片 */
        .date-card {
            align-self: flex-start;
            padding: 12px 16px;
            border-radius: 16px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(212,160,181,0.2);
            color: #d4a0b5;
            transition: all 0.8s ease;
        }
        .date-card .year { font-size: 14px; font-weight: 300; letter-spacing: 2px; }
        .date-card .day { font-size: 18px; font-weight: 500; margin-top: 2px; }
        /* 拍立得 */
        .polaroid {
            align-self: flex-start;
            width: 70%;
            background: #fcf5f8;
            border: 8px solid #fcf5f8;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(212,160,181,0.15);
            transition: all 0.8s ease;
            position: relative;
        }
        .polaroid .photo {
            width: 100%;
            aspect-ratio: 1/1;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }
        .polaroid .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .polaroid .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        .polaroid .text-overlay .love { font-size: 12px; letter-spacing: 2px; }
        .polaroid .text-overlay .days { font-size: 48px; line-height: 1; }
        .polaroid .text-overlay .start { font-size: 10px; opacity: 0.8; margin-top: 4px; }
        /* 两个圆角框 */
        .rounded-box {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 16px 20px;
            border: 1px solid rgba(212,160,181,0.15);
            transition: all 0.8s ease;
        }
        .rounded-box .row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d4a0b5;
            transition: color 0.8s ease;
        }
        .rounded-box .row .emoji { font-size: 28px; }
        .rounded-box .row .status { font-size: 16px; font-weight: 500; }
        .rounded-box .message {
            margin-top: 8px;
            font-size: 14px;
            color: #d4a0b5;
            transition: color 0.8s ease;
            line-height: 1.4;
        }
        .small-box {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid rgba(212,160,181,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d4a0b5;
            transition: all 0.8s ease;
        }
        .small-box .icon { font-size: 20px; }
        .small-box .text { font-size: 14px; font-weight: 300; }
        /* 按钮 */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            border: none;
            background: #d4a0b5;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>
    <div class="today-page" id="todayPage">
        <div class="top-gradient" id="topGradient"></div>

        <div class="content">
            <!-- 日期 -->
            <div class="date-card" id="dateCard">
                <div class="year" id="yearText">2026 年</div>
                <div class="day" id="dayText">5 月 15 日</div>
            </div>

            <!-- 拍立得 -->
            <div class="polaroid" id="polaroid">
                <div class="photo">
                    <img src="https://picsum.photos/seed/1/300/300" alt="纪念日">
                </div>
                <div class="text-overlay">
                    <div class="love">恋爱已经</div>
                    <div class="days" id="daysCount">461</div>
                    <div class="start">起始日：2025-2-8 星期六</div>
                </div>
            </div>

            <!-- 右上：状态框 -->
            <div class="rounded-box" id="statusBox">
                <div class="row">
                    <span class="emoji" id="statusEmoji">😍</span>
                    <span class="status" id="statusText">兴奋</span>
                </div>
                <div class="message" id="statusMessage">你是最喜欢的人</div>
            </div>

            <!-- 右下：小状态框 -->
            <div class="small-box" id="smallBox">
                <span class="icon" id="smallIcon">📍</span>
                <span class="text" id="smallText">清风徐徐</span>
            </div>

            <!-- 按钮 -->
            <button class="btn" id="enterBtn">欢迎相遇</button>
        </div>
    </div>

    <script>
        // ===== 配置 =====
        const CONFIG = {
            themeColor: '#d4a0b5',
            // 纪念日数据（将来可从“倒数日”功能读取）
            anniversary: {
                startDate: '2025-02-08',
                startText: '2025-2-8 星期六',
                photo: 'https://picsum.photos/seed/1/300/300',
                title: '恋爱已经'
            },
            // 字卡模拟
            statuses: ['兴奋', '安心', '想你', '忙碌', '开心'],
            emojis: ['😍', '😊', '🥰', '😘', '💕'],
            messages: ['你是最喜欢的人', '今天也想见你', '有你在真好', '要好好吃饭', '晚安'],
            smallTexts: ['清风徐徐', '阳光正好', '微风不燥', '星光点点', '月色温柔'],
            smallIcons: ['📍', '☀️', '🌙', '⭐', '🌈']
        };

        // ===== 更新主题色 =====
        function setTheme(color) {
            CONFIG.themeColor = color;
            const light = color + '22';
            const lighter = color + '0a';
            const text = color;

            document.querySelector('.top-gradient').style.background =
                `linear-gradient(180deg, ${color} 0%, ${color}22 60%, ${color}0a 100%)`;
            document.querySelectorAll('.date-card, .rounded-box, .small-box').forEach(el => {
                el.style.borderColor = color + '30';
                el.style.background = `rgba(255,255,255,0.3)`;
            });
            document.querySelectorAll('.date-card .year, .date-card .day, .rounded-box .row, .rounded-box .message, .small-box').forEach(el => {
                el.style.color = text;
            });
            document.querySelector('.btn').style.background = color;
            document.querySelector('.polaroid').style.borderColor = lighter;
            document.querySelector('.polaroid').style.background = lighter;
        }

        // ===== 更新日期 =====
        function updateDate() {
            const now = new Date();
            const y = now.getFullYear();
            const m = now.getMonth() + 1;
            const d = now.getDate();
            document.getElementById('yearText').textContent = y + ' 年';
            document.getElementById('dayText').textContent = m + ' 月 ' + d + ' 日';
        }

        // ===== 更新纪念日天数 =====
        function updateDays() {
            const start = new Date(CONFIG.anniversary.startDate);
            const now = new Date();
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            document.getElementById('daysCount').textContent = diff;
            document.querySelector('.polaroid .start').textContent = '起始日：' + CONFIG.anniversary.startText;
            document.querySelector('.polaroid .love').textContent = CONFIG.anniversary.title;
            document.querySelector('.polaroid img').src = CONFIG.anniversary.photo;
        }

        // ===== 从字卡随机抽取 =====
        function randomPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function updateStatus() {
            document.getElementById('statusEmoji').textContent = randomPick(CONFIG.emojis);
            document.getElementById('statusText').textContent = randomPick(CONFIG.statuses);
            document.getElementById('statusMessage').textContent = randomPick(CONFIG.messages);
            document.getElementById('smallIcon').textContent = randomPick(CONFIG.smallIcons);
            document.getElementById('smallText').textContent = randomPick(CONFIG.smallTexts);
        }

        // ===== 按钮点击 =====
        document.getElementById('enterBtn').addEventListener('click', function() {
            alert('进入聊天界面（此处将跳转到聊天系统）');
            // window.location.href = 'chat.html';
        });

        // ===== 初始化 =====
        function init() {
            updateDate();
            updateDays();
            updateStatus();
            setTheme(CONFIG.themeColor);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
