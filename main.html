<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日</title>
    <style>
        :root { --theme: #d4a0b5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #ffffff 0%, #fff5f7 40%, #fce8ef 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
            cursor: default; -webkit-user-select: none; user-select: none; position: relative;
        }
        .sparkles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .sparkle {
            position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff; animation: spark 1.5s ease-in-out infinite;
        }
        @keyframes spark {
            0%,100% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.9; transform: scale(1); }
        }
        .petals { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .petal {
            position: absolute; top: -35px;
            background: radial-gradient(ellipse at 30% 30%, #f0c8d6 0%, #e2a8b8 60%, #d490a5 100%);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            30% { transform: translateY(30vh) rotate(120deg) translateX(45px); opacity: 0.5; }
            60% { transform: translateY(60vh) rotate(240deg) translateX(-45px); opacity: 0.3; }
            85% { transform: translateY(85vh) rotate(320deg) translateX(25px); opacity: 0.1; }
            100% { transform: translateY(105vh) rotate(360deg) translateX(-15px); opacity: 0; }
        }

        .card-shadow {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 60px rgba(180,130,150,0.12), 0 0 80px rgba(212,160,181,0.08);
            padding: 60px 36px 48px;
            display: flex; flex-direction: column; align-items: center;
            gap: 18px; text-align: center;
            width: 84vw; max-width: 350px;
        }
        .card-top {
            position: absolute; z-index: 2; top: 12px; left: 12px; right: 12px; bottom: 12px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 0.6px solid rgba(255,255,255,0.5);
            pointer-events: none;
        }

        .title-lucky { color: var(--theme); font-size: 38px; letter-spacing: 6px; font-weight: bold; font-family: 'Times New Roman','Georgia',serif; transform: scaleY(1.1); }
        .date-text { color: var(--theme); font-size: 13px; letter-spacing: 3px; opacity: 0.8; }
        .name-tag { color: var(--theme); font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        .status-tag { 
            display: inline-block; background: rgba(212,160,181,0.15); color: var(--theme);
            padding: 6px 16px; border-radius: 20px; font-size: 12px; letter-spacing: 2px;
            border: 0.5px solid rgba(212,160,181,0.3);
        }
        .weather-tag {
            display: inline-block; background: rgba(212,160,181,0.1); color: var(--theme);
            padding: 5px 14px; border-radius: 16px; font-size: 11px; letter-spacing: 2px;
        }
        .message-line { color: var(--theme); font-size: 14px; letter-spacing: 2px; opacity: 0.85; font-style: italic; margin-top: 4px; }
        .btn-start {
            background: rgba(212,160,181,0.25); color: var(--theme); border: 0.6px solid rgba(212,160,181,0.4);
            padding: 12px 40px; border-radius: 28px; font-size: 14px; letter-spacing: 3px;
            cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease; margin-top: 6px;
        }
        .btn-start:hover { background: rgba(212,160,181,0.4); box-shadow: 0 0 20px rgba(212,160,181,0.25); }
    </style>
</head>
<body>
    <div class="sparkles" id="sparkles"></div>
    <div class="petals" id="petals"></div>

    <div class="card-shadow" id="cardShadow">
        <div class="card-top"></div>
        <div class="title-lucky">LUCKY DAY</div>
        <div class="date-text" id="dateText">2026年5月11日</div>
        <div class="name-tag" id="nameTag">夏以昼</div>
        <div class="status-tag" id="statusTag">兴奋</div>
        <div class="weather-tag" id="weatherTag">绿意盎然</div>
        <div class="message-line" id="messageLine">“好好吃饭了吗？”</div>
        <button class="btn-start" onclick="goChat()">开始今天</button>
    </div>

    <script>
        (function() {
            var sBox = document.getElementById('sparkles');
            for (var i = 0; i < 500; i++) {
                var sp = document.createElement('div'); sp.className = 'sparkle';
                sp.style.left = Math.random() * 98 + '%';
                sp.style.top = Math.random() * 98 + '%';
                sp.style.animationDelay = Math.random() * 3 + 's';
                sp.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                sBox.appendChild(sp);
            }
            var pBox = document.getElementById('petals');
            for (var i = 0; i < 30; i++) {
                var p = document.createElement('div'); p.className = 'petal';
                var s = 7 + Math.random() * 13;
                p.style.width = s + 'px'; p.style.height = s * 0.65 + 'px';
                p.style.left = Math.random() * 96 + '%';
                p.style.animationDuration = (7 + Math.random() * 10) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.opacity = 0.3 + Math.random() * 0.4;
                p.style.borderRadius = (45+Math.random()*20)+'% '+(2+Math.random()*12)+'% '+(35+Math.random()*25)+'% '+(2+Math.random()*12)+'%';
                pBox.appendChild(p);
            }

            var now = new Date();
            document.getElementById('dateText').textContent = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日';

            var statuses = ['兴奋', '困困', '安心', '生气', '无法决定', '想你'];
            var weathers = ['绿意盎然', '清风徐徐', '阳光正好', '细雨绵绵', '彩虹出现了'];
            var messages = ['好好吃饭了吗？', '今天也要开心哦', '我会看着你的', '你是最喜欢的人', '别太累了'];

            document.getElementById('statusTag').textContent = statuses[Math.floor(Math.random() * statuses.length)];
            document.getElementById('weatherTag').textContent = weathers[Math.floor(Math.random() * weathers.length)];
            document.getElementById('messageLine').textContent = '“' + messages[Math.floor(Math.random() * messages.length)] + '”';

            window.goChat = function() {
                window.location.href = 'chat.html';
            };
        })();
    </script>
</body>
</html>
