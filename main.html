<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日</title>
    <style>
        :root { --theme: #d4a0b5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
            cursor: default; -webkit-user-select: none; user-select: none;
        }

        .card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border-radius: 32px;
            border: 0.5px solid rgba(255,255,255,0.35);
            box-shadow: 0 25px 60px rgba(180,130,150,0.08), inset 0 1px 4px rgba(255,255,255,0.2);
            padding: 44px 28px 36px; display: flex; flex-direction: column; align-items: center;
            gap: 20px; width: 78vw; max-width: 320px;
        }

        .title-lucky { color: rgba(212,160,181,0.7); font-size: 32px; letter-spacing: 7px; font-weight: bold; font-family: 'Times New Roman','Georgia',serif; }
        .date-text { color: rgba(212,160,181,0.55); font-size: 11px; letter-spacing: 3px; }

        /* 中间内容区 */
        .info-row {
            display: flex; gap: 18px; align-items: center; width: 100%; justify-content: center;
        }
        .name-status-box {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.08); border-radius: 22px;
            padding: 18px 20px; border: 0.3px solid rgba(255,255,255,0.25);
        }
        .name-tag { color: rgba(212,160,181,0.7); font-size: 20px; font-weight: bold; letter-spacing: 3px; }
        .status-tag { color: rgba(212,160,181,0.6); font-size: 11px; letter-spacing: 2px; }
        .message-tag { color: rgba(212,160,181,0.6); font-size: 11px; letter-spacing: 2px; font-style: italic; margin-top: 2px; }
        .weather-tag { color: rgba(212,160,181,0.5); font-size: 11px; letter-spacing: 2px; margin-top: 8px; }

        .btn-welcome {
            background: rgba(212,160,181,0.1); color: rgba(212,160,181,0.65); border: 0.4px solid rgba(212,160,181,0.25);
            padding: 12px 36px; border-radius: 26px; font-size: 14px; letter-spacing: 4px;
            cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease; margin-top: 6px;
        }
        .btn-welcome:hover { background: rgba(212,160,181,0.2); box-shadow: 0 0 20px rgba(212,160,181,0.15); }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="title-lucky">LUCKY DAY</div>
        <div class="date-text" id="dateText">2026年5月11日</div>

        <div class="info-row">
            <div class="name-status-box" id="nameStatusBox">
                <div class="name-tag" id="nameTag">夏以昼</div>
                <div class="status-tag" id="statusTag">兴奋</div>
                <div class="message-tag" id="messageTag">“别太累了”</div>
            </div>
        </div>

        <div class="weather-tag" id="weatherTag">绿意盎然</div>

        <button class="btn-welcome" onclick="goChat()">欢迎相遇</button>
    </div>

    <script>
        (function() {
            var now = new Date();
            document.getElementById('dateText').textContent = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日';

            var statuses = ['兴奋', '困困', '安心', '生气', '无法决定', '想你'];
            var weathers = ['绿意盎然', '清风徐徐', '阳光正好', '细雨绵绵', '彩虹出现了'];
            var messages = ['好好吃饭了吗？', '我会看着你的', '你是最喜欢的人', '别太累了', '今天也很想你'];

            document.getElementById('statusTag').textContent = statuses[Math.floor(Math.random() * statuses.length)];
            document.getElementById('weatherTag').textContent = weathers[Math.floor(Math.random() * weathers.length)];
            document.getElementById('messageTag').textContent = '“' + messages[Math.floor(Math.random() * messages.length)] + '”';

            window.goChat = function() {
                window.location.href = 'chat.html';
            };
        })();
    </script>
</body>
</html>
